<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <title>Calculator</title>
</head>
<body>
    <div id="calculator-body">
        <div id="screen">

        </div>
        <div id="buttonsContainer">
            <div id="row1">
                <button id="hoverer" class="clear">CE</button>
                <button id="hoverer" class="sqrt">&radic;x</button>
                <button id="hoverer" class="percent">%</button>
                <button id="hoverer" class="divide">&divide;</button>
            </div>
            <div id="row2">
                <button id="hoverer" class="seven">7</button>
                <button id="hoverer" class="eight">8</button>
                <button id="hoverer" class="nine">9</button>
                <button id="hoverer" class="multiply">&#215;</button>
            </div>
            <div id="row3">
                <button id="hoverer" class="four">4</button>
                <button id="hoverer" class="five">5</button>
                <button id="hoverer" class="six">6</button>
                <button id="hoverer" class="subtract">-</button>
            </div>
            <div id="row4">
                <button id="hoverer" class="one">1</button>
                <button id="hoverer" class="two">2</button>
                <button id="hoverer" class="three">3</button>
                <button id="hoverer" class="add">+</button>
            </div>
            <div id="row5">
                <button id="hoverer" class="zero">0</button>
                <button id="hoverer" class="decimal">.</button>
                <button id="hoverer" class="negate">+/-</button>
                <button id="hoverer" class="equal">=</button>
            </div>

        </div>
    </div>
</body>
</html>
